<!DOCTYPE html>
<html>
<head>
<title>System Loading...</title>

<style>
body {
  background: black;
  color: lime;
  font-family: monospace;
  text-align: center;
}

#hackMsg {
  display: none;
  font-size: 24px;
  margin-top: 20%;
  animation: blink 0.5s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>

</head>

<body>

<h2>Connecting to Secure Server...</h2>
<p id="loading">Please wait...</p>

<div id="hackMsg">⚠️ YOUR PHONE HAS BEEN HACKED!</div>

<audio id="beep">
  <source src="https://www.soundjay.com/button/beep-07.wav" type="audio/wav">
</audio>

<script>

// Fake loading text change
let text = ["Connecting...", "Accessing Data...", "Bypassing Security...", "Injecting Virus..."];
let i = 0;

let interval = setInterval(() => {
  document.getElementById("loading").innerText = text[i];
  i++;
  if(i >= text.length){
    clearInterval(interval);
  }
}, 1000);

// Show hack message after 4 sec
setTimeout(() => {
  document.getElementById("hackMsg").style.display = "block";
  document.getElementById("beep").play();
}, 4000);

// Hide after 4 more sec
setTimeout(() => {
  document.getElementById("hackMsg").style.display = "none";
}, 8000);

</script>

</body>
</html>
